  <!-- iG text -->
  <text x="64" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="1">iGenius</text>
